# Builds the Python package, uploads it to the VPS, and deploys the app files at the web root.
# Configure the required "Production" environment secrets before running:
# - VPS_HOST: VPS hostname or IP address.
# - VPS_USERNAME: SSH/SFTP username.
# - VPS_PASSWORD: SSH/SFTP password for the VPS user.
# - VPS_DEPLOY_PATH: Absolute remote web/application directory, for example /home/user/app.example.com.
# Optional repository/environment variables:
# - VPS_PORT: SSH/SFTP port. Defaults to 22.
# - PYTHON_VERSION: Python version used for the build. Defaults to 3.13.
# - VPS_PYTHON_BIN: Python executable on the VPS used for the virtualenv. Defaults to python3.
# Optional Google Analytics runtime configuration:
# - GOOGLE_APPLICATION_CREDENTIALS_JSON: Secret containing ADC/service-account JSON; do not use an API key.
# - GOOGLE_PROJECT_ID: Repository/environment variable or secret for the Google Cloud project ID.
name: Deploy to VPS via SFTP

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-vps-sftp
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: Production
    env:
      PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.13' }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ vars.VPS_PORT || '22' }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
      REVISION: ${{ github.sha }}
      VPS_PYTHON_BIN: ${{ vars.VPS_PYTHON_BIN || 'python3' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Prepare deployment bundle
        run: |
          set -euo pipefail
          rm -rf deploy analytics-mcp-deploy.tar.gz
          mkdir -p deploy
          cp -R analytics_mcp deploy/analytics_mcp
          cp -R dist deploy/dist
          cp pyproject.toml README.md LICENSE passenger_wsgi.py deploy/
          python - <<'PY'
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path('pyproject.toml').read_text())['project']
          Path('deploy/requirements.txt').write_text('\n'.join(project.get('dependencies', [])) + '\n')
          PY
          cat > deploy/server.py <<'PY'
          #!/usr/bin/env python3
          """Root-level launcher for DreamHost/VPS deployments."""

          from analytics_mcp.server import run_server


          if __name__ == "__main__":
              run_server()
          PY
          cat > deploy/start.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          APP_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$APP_DIR"
          if [ -f ./.env ]; then
            set -a
            . ./.env
            set +a
          fi
          if [ -f ./.secrets/google-application-credentials.json ]; then
            export GOOGLE_APPLICATION_CREDENTIALS="$APP_DIR/.secrets/google-application-credentials.json"
          fi
          if [ -f ./.secrets/mcp-auth-token ]; then
            export MCP_AUTH_TOKEN="$(cat "$APP_DIR/.secrets/mcp-auth-token")"
          fi
          if [ -f ./.secrets/mcp-oauth-client-id ]; then
            export MCP_OAUTH_CLIENT_ID="$(cat "$APP_DIR/.secrets/mcp-oauth-client-id")"
          fi
          if [ -f ./.secrets/mcp-oauth-client-secret ]; then
            export MCP_OAUTH_CLIENT_SECRET="$(cat "$APP_DIR/.secrets/mcp-oauth-client-secret")"
          fi
          if [ -f ./.secrets/mcp-oauth-redirect-uris ]; then
            export MCP_OAUTH_REDIRECT_URIS="$(cat "$APP_DIR/.secrets/mcp-oauth-redirect-uris")"
          fi
          if [ -x ./.venv/bin/analytics-mcp-http ]; then
            exec ./.venv/bin/analytics-mcp-http --host "${MCP_HTTP_HOST:-127.0.0.1}" --port "${PORT:-${MCP_HTTP_PORT:-8000}}" "$@"
          fi
          exec analytics-mcp-http --host "${MCP_HTTP_HOST:-127.0.0.1}" --port "${PORT:-${MCP_HTTP_PORT:-8000}}" "$@"
          SH
          chmod +x deploy/start.sh
          cat > deploy/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Analytics MCP Deployment</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  background: #f8fafc;
                  color: #0f172a;
                }
                main {
                  max-width: 720px;
                  padding: 2rem;
                  border-radius: 1rem;
                  background: #fff;
                  box-shadow: 0 20px 45px rgb(15 23 42 / 10%);
                }
                code {
                  display: inline-block;
                  padding: .2rem .4rem;
                  border-radius: .35rem;
                  background: #e2e8f0;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Analytics MCP is deployed</h1>
                <p>The VPS deployment completed and the application files are present at the web root.</p>
                <p>This project exposes MCP over Streamable HTTP when <code>./start.sh</code> is running behind your web server or reverse proxy.</p>
                <p>MCP endpoint: <code>/mcp</code>. Health endpoint: <code>/health</code>.</p>
                <p>Revision: <code>__REVISION__</code></p>
              </main>
            </body>
          </html>
          HTML
          sed -i "s/__REVISION__/$REVISION/g" deploy/index.html
          cat > deploy/health.json <<'JSON'
          {"status":"deployed","service":"analytics-mcp","revision":"__REVISION__"}
          JSON
          sed -i "s/__REVISION__/$REVISION/g" deploy/health.json
          cat > deploy/.htaccess <<'HTACCESS'
          Options -Indexes
          DirectoryIndex index.html
          RewriteEngine On
          RewriteRule ^health/?$ http://127.0.0.1:8000/health [P,L]
          RewriteRule ^oauth(/.*)?$ http://127.0.0.1:8000/oauth$1 [P,L]
          RewriteRule ^\.well-known/(oauth-authorization-server|oauth-protected-resource/mcp/?|openid-configuration)$ http://127.0.0.1:8000/.well-known/$1 [P,L]
          RewriteRule ^mcp(/.*)?$ http://127.0.0.1:8000/mcp$1 [P,L]

          <FilesMatch "\.(py|toml|md|txt|gz|whl)$">
            Require all denied
          </FilesMatch>
          HTACCESS
          chmod +x deploy/server.py
          printf '%s\n' "$REVISION" > deploy/REVISION
          tar -C deploy -czf analytics-mcp-deploy.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: analytics-mcp-deploy
          path: analytics-mcp-deploy.tar.gz
          if-no-files-found: error

      - name: Install deployment clients
        run: sudo apt-get update && sudo apt-get install -y lftp openssh-client sshpass

      - name: Validate deploy configuration
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_HOST VPS_USERNAME VPS_PASSWORD VPS_DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deploy secret::$name is not configured for the Production environment or repository."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Trust VPS host key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload bundle and deploy script over SFTP
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail
          lftp \
            -u "$VPS_USERNAME,$VPS_PASSWORD" \
            -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=yes -p $VPS_PORT'; mkdir -p '$VPS_DEPLOY_PATH/.deploy'; cd '$VPS_DEPLOY_PATH/.deploy'; put -O . analytics-mcp-deploy.tar.gz; put -O . .github/scripts/deploy-vps.sh; bye" \
            "sftp://$VPS_HOST"

      - name: Activate release over SSH
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail
          sshpass -e ssh \
            -p "$VPS_PORT" \
            -o StrictHostKeyChecking=yes \
            "$VPS_USERNAME@$VPS_HOST" \
            "bash '$VPS_DEPLOY_PATH/.deploy/deploy-vps.sh' '$VPS_DEPLOY_PATH' '$REVISION' '$VPS_PYTHON_BIN'"

      - name: Install Google credentials on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GOOGLE_PROJECT_ID: ${{ vars.GOOGLE_PROJECT_ID || secrets.GOOGLE_PROJECT_ID }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          MCP_OAUTH_CLIENT_ID: ${{ vars.MCP_OAUTH_CLIENT_ID || secrets.MCP_OAUTH_CLIENT_ID }}
          MCP_OAUTH_CLIENT_SECRET: ${{ secrets.MCP_OAUTH_CLIENT_SECRET }}
          MCP_OAUTH_REDIRECT_URIS: ${{ vars.MCP_OAUTH_REDIRECT_URIS || secrets.MCP_OAUTH_REDIRECT_URIS }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ] && [ -z "${MCP_AUTH_TOKEN:-}" ] && [ -z "${MCP_OAUTH_CLIENT_ID:-}" ] && [ -z "${MCP_OAUTH_CLIENT_SECRET:-}" ] && [ -z "${MCP_OAUTH_REDIRECT_URIS:-}" ]; then
            echo "No Google credentials, MCP auth token, or OAuth client secrets configured; skipping secrets install."
            exit 0
          fi
          CREDS_B64=$(printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" | base64 -w 0)
          PROJECT_B64=$(printf '%s' "${GOOGLE_PROJECT_ID:-}" | base64 -w 0)
          MCP_AUTH_TOKEN_B64=$(printf '%s' "${MCP_AUTH_TOKEN:-}" | base64 -w 0)
          MCP_OAUTH_CLIENT_ID_B64=$(printf '%s' "${MCP_OAUTH_CLIENT_ID:-}" | base64 -w 0)
          MCP_OAUTH_CLIENT_SECRET_B64=$(printf '%s' "${MCP_OAUTH_CLIENT_SECRET:-}" | base64 -w 0)
          MCP_OAUTH_REDIRECT_URIS_B64=$(printf '%s' "${MCP_OAUTH_REDIRECT_URIS:-}" | base64 -w 0)
          sshpass -e ssh \
            -p "$VPS_PORT" \
            -o StrictHostKeyChecking=yes \
            "$VPS_USERNAME@$VPS_HOST" \
            "DEPLOY_PATH='$VPS_DEPLOY_PATH' CREDS_B64='$CREDS_B64' PROJECT_B64='$PROJECT_B64' MCP_AUTH_TOKEN_B64='$MCP_AUTH_TOKEN_B64' MCP_OAUTH_CLIENT_ID_B64='$MCP_OAUTH_CLIENT_ID_B64' MCP_OAUTH_CLIENT_SECRET_B64='$MCP_OAUTH_CLIENT_SECRET_B64' MCP_OAUTH_REDIRECT_URIS_B64='$MCP_OAUTH_REDIRECT_URIS_B64' bash -s" <<'REMOTE'
          set -euo pipefail
          install -m 700 -d "$DEPLOY_PATH/.secrets"
          if [ -n "${CREDS_B64:-}" ]; then
            install -m 700 -d "$HOME/.config/gcloud"
            printf '%s' "$CREDS_B64" | base64 -d > "$DEPLOY_PATH/.secrets/google-application-credentials.json"
            cp "$DEPLOY_PATH/.secrets/google-application-credentials.json" "$HOME/.config/gcloud/application_default_credentials.json"
            chmod 700 "$HOME/.config/gcloud"
            chmod 600 "$DEPLOY_PATH/.secrets/google-application-credentials.json"
            chmod 600 "$HOME/.config/gcloud/application_default_credentials.json"
          fi
          chmod 700 "$DEPLOY_PATH/.secrets"
          if [ -n "${MCP_AUTH_TOKEN_B64:-}" ]; then
            printf '%s' "$MCP_AUTH_TOKEN_B64" | base64 -d > "$DEPLOY_PATH/.secrets/mcp-auth-token"
            chmod 600 "$DEPLOY_PATH/.secrets/mcp-auth-token"
          fi
          if [ -n "${MCP_OAUTH_CLIENT_ID_B64:-}" ]; then
            printf '%s' "$MCP_OAUTH_CLIENT_ID_B64" | base64 -d > "$DEPLOY_PATH/.secrets/mcp-oauth-client-id"
            chmod 600 "$DEPLOY_PATH/.secrets/mcp-oauth-client-id"
          fi
          if [ -n "${MCP_OAUTH_CLIENT_SECRET_B64:-}" ]; then
            printf '%s' "$MCP_OAUTH_CLIENT_SECRET_B64" | base64 -d > "$DEPLOY_PATH/.secrets/mcp-oauth-client-secret"
            chmod 600 "$DEPLOY_PATH/.secrets/mcp-oauth-client-secret"
          fi
          if [ -n "${MCP_OAUTH_REDIRECT_URIS_B64:-}" ]; then
            printf '%s' "$MCP_OAUTH_REDIRECT_URIS_B64" | base64 -d > "$DEPLOY_PATH/.secrets/mcp-oauth-redirect-uris"
            chmod 600 "$DEPLOY_PATH/.secrets/mcp-oauth-redirect-uris"
          fi
          if [ -n "${PROJECT_B64:-}" ]; then
            PROJECT_ID=$(printf '%s' "$PROJECT_B64" | base64 -d)
            if [ -n "$PROJECT_ID" ]; then
              printf 'GOOGLE_PROJECT_ID=%s\n' "$PROJECT_ID" > "$DEPLOY_PATH/.env"
              chmod 600 "$DEPLOY_PATH/.env"
            fi
          fi
          if [ -f "$DEPLOY_PATH/.deploy/app.pid" ] && kill -0 "$(cat "$DEPLOY_PATH/.deploy/app.pid")" 2>/dev/null; then
            kill "$(cat "$DEPLOY_PATH/.deploy/app.pid")"
            rm -f "$DEPLOY_PATH/.deploy/app.pid"
          fi
          nohup "$DEPLOY_PATH/start.sh" > "$DEPLOY_PATH/.deploy/app.log" 2>&1 &
          echo $! > "$DEPLOY_PATH/.deploy/app.pid"
          REMOTE

      - name: Smoke test deployed application
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail
          sshpass -e ssh \
            -p "$VPS_PORT" \
            -o StrictHostKeyChecking=yes \
            "$VPS_USERNAME@$VPS_HOST" \
            "DEPLOY_PATH='$VPS_DEPLOY_PATH' EXPECTED_REVISION='$REVISION' bash -s" <<'REMOTE'
          set -euo pipefail
          source "$DEPLOY_PATH/.deploy/last-deploy.env"
          test "$REVISION" = "$EXPECTED_REVISION"
          test -x "$DEPLOY_PATH/start.sh"
          test -x "$START_COMMAND"
          if [ -f "$DEPLOY_PATH/.deploy/app.pid" ] && ! kill -0 "$(cat "$DEPLOY_PATH/.deploy/app.pid")" 2>/dev/null; then
            echo "Stale app pid found; restarting MCP HTTP server." >&2
            rm -f "$DEPLOY_PATH/.deploy/app.pid"
          fi
          if [ ! -f "$DEPLOY_PATH/.deploy/app.pid" ]; then
            nohup "$DEPLOY_PATH/start.sh" > "$DEPLOY_PATH/.deploy/app.log" 2>&1 &
            echo $! > "$DEPLOY_PATH/.deploy/app.pid"
          fi
          PORT_VALUE=$(grep '^PORT=' "$DEPLOY_PATH/.env" 2>/dev/null | cut -d= -f2- || true)
          MCP_HTTP_PORT_VALUE=$(grep '^MCP_HTTP_PORT=' "$DEPLOY_PATH/.env" 2>/dev/null | cut -d= -f2- || true)
          LOCAL_PORT="${PORT_VALUE:-${MCP_HTTP_PORT_VALUE:-8000}}"
          export LOCAL_PORT
          for attempt in $(seq 1 30); do
            if "$PYTHON_COMMAND" -c 'import os, urllib.request; print(urllib.request.urlopen("http://127.0.0.1:{}/health".format(os.environ["LOCAL_PORT"]), timeout=5).read().decode())'; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "MCP HTTP server did not become healthy on port $LOCAL_PORT." >&2
              echo "--- app.log ---" >&2
              tail -n 200 "$DEPLOY_PATH/.deploy/app.log" >&2 || true
              exit 1
            fi
            sleep 2
          done
          grep -q 'RewriteRule ^mcp' "$DEPLOY_PATH/.htaccess"
          grep -q 'RewriteRule ^oauth' "$DEPLOY_PATH/.htaccess"
          grep -q 'RewriteRule ^\.well-known' "$DEPLOY_PATH/.htaccess"
          grep -q 'RewriteRule ^health' "$DEPLOY_PATH/.htaccess"
          PYTHONWARNINGS="ignore::UserWarning,ignore::FutureWarning" \
            "$PYTHON_COMMAND" -c 'import analytics_mcp.http_server; print("analytics_mcp http import ok")'
          test -f "$DEPLOY_PATH/health.json"
          echo "Remote smoke test passed for $REVISION using $START_COMMAND"
          REMOTE
